<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Konya Kuaför | Randevu Al</title>  

  <meta name="description" content="Konya Kuaför. WhatsApp üzerinden hızlı randevu alın." /> 

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body { min-height: 100vh; background: #101010; color: #fff; display: flex; align-items: center; justify-content: center; padding: 18px; }
    .page { width: 100%; max-width: 440px; background: #181818; border: 1px solid #2d2d2d; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.45); }
    
    .title h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.6px;
      color: #f5f5f5;
    }

    .title h1 span {
      color: #f1f1f1; 
      font-weight: 600;
    }

    .cover {
      min-height: 230px;
      background:
        linear-gradient(rgba(0,0,0,.05), rgba(0,0,0,.45)),
        url("foto.jpg");
      background-size: contain;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 24px;
    }

    .cover h1 {
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -.5px;
      text-shadow: 0 3px 12px rgba(0,0,0,.65);
    }

    .cover span { color: #cfcfcf; }
    .content { padding: 24px; }
    .description { color: #cfcfcf; font-size: 15px; margin-bottom: 18px; line-height: 1.55; }
    
    .info-list { display: grid;  margin-bottom: 15px; color: #ddd; font-size: 14px; }

    .form-title-box {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 24px 0 18px 0;
      color: #cfcfcf;
      font-size: 15.5px;
      font-weight: 600;
      letter-spacing: 0.1px;
      line-height: 1;
    }
    
    .info-label {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
      letter-spacing: 0.1px;
    }

    .form-title-box {
      display: flex;  
      align-items: center;  
      gap: 9px;  
      margin: 24px 0 18px 0;  
      color: #f1f1f1f0;   
      font-size: 15.5px;  
      font-weight: 600;  
      letter-spacing: 0.2px;  
      line-height: 1;
      background: rgba(37, 211, 102, 0.08);
      border: 1px solid rgba(37, 211, 102, 0.25);
      padding: 12px 14px;
      border-radius: 12px;
      border-left: 4px solid #25D366;
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.2);
      text-shadow: 0 0 6px rgba(232,201,106,0.25); 
    }

    .whatsapp-icon {
      color: #25d366;
      font-size: 19px;
      line-height: 1;
      width: auto;
      text-align: center;
      filter: drop-shadow(0 0 4px rgba(37,211,102,.25));
    }

    .info-item.address-card {
      display: grid;
      grid-template-columns: 24px 1fr;
      column-gap: 8px;
      align-items: start;
      padding: 8px 12px 0;
    }

    .address-icon {
      width: 24px;
      min-width: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-size: 17px;
      line-height: 1;
      margin-top: 1px;
      transform: none;
    }

    .address-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .address-content .info-label {
      display: block;
      line-height: 1;
      margin: 0 0 3px 0;
    }

    .address-line {
      display: block;
      font-size: 15px;
      line-height: 1.25;
      margin: 0;
      color: #9a9a9a;
    }

    .info-item.work-card {
      display: grid;
      grid-template-columns: 24px 1fr;
      column-gap: 8px;
      align-items: start;
      border-radius: 10px;  
      padding: 10px 12px;   
    }

    .work-icon {
      width: 24px;
      min-width: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-size: 17px;
      line-height: 1;
      opacity: 0.65;
      margin-top: 1px;
      transform: none;
    }

    .work-content {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .work-content .info-label {
      display: block;
      line-height: 1;
      margin: 0;
    }

    .work-line {
      display: block;
      line-height: 1.25;
      margin: 0;
      font-size: 14px;
      color: #9a9a9a;
    }
    
    .prices { margin: 20px 0; background: #111; border: 1px solid #303030; border-radius: 16px; overflow: hidden; }
    .price-row { display: flex; justify-content: space-between; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #303030; font-size: 14px; }
    .price-row:last-child { border-bottom: none; }
    .price-row strong { color: #d4af37; white-space: nowrap; }
    
    form { display: grid; gap: 12px; }
    label { font-size: 13px; color: #bbb; display: block; margin-bottom: 6px; }
    input, select { width: 100%; padding: 13px 14px; border-radius: 12px; border: 1px solid #3a3a3a; background: #111; color: #fff; outline: none; font-size: 15px; }
    input:focus, select:focus { border-color: #d4af37; }
    option:disabled { color: #777; background: #222; }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    /* Butona width: 100% eklendi (eski büyük formuna kavuşması için) */
    .button { display: block; width: 100%; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; 
      background: #147136; color: #fff; margin-top: 6px; transition: .2s; }
    .button:hover { transform: translateY(-1px); filter: brightness(1.06); }
    
    .secondary-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .small-btn { text-align: center; border: 1px solid #3a3a3a; color: #eee; padding: 12px; border-radius: 12px; font-size: 14px; background: #222222; text-decoration: none; }
    
    .note {
      font-size: 12px;
      color: #8f8f8f;
      line-height: 1.5;
      margin-top: 16px;
      text-align: center;
    }
    
    @media (max-width: 420px) { 
      body { padding: 12px; } 
      .cover { min-height: 160px; padding: 20px; } 
      .cover h1 { font-size: 26px; } 
      .content { padding: 20px; } 
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="cover">
    </section>
    <section class="content">
      
      <div class="title">
        <h1>Konya <span>Kuaför</span></h1>    
        <p class="description"></p>
      </div>

      <p class="description"></p>
      
      <div class="info-list">
        <div class="info-item address-card">          
          <span class="address-icon">📍</span>
          <div class="address-content">
            <div class="address-line">Adres: Melikşah Mahallesi, Şeyh Sokak</div>        
            <div class="address-line">Semt Pazarı Yanı</div>
            <div class="address-line muted">Selçuklu / Konya</div>
          </div>
        </div>

        <div class="info-item work-card">
          <span class="work-icon">⏰</span>
          <div class="work-content">
            <div class="work-line">Çalışma Saatleri: Pazar Hariç 09:00 - 21:00</div>  
          </div>
        </div>
      </div>
        
      <div class="form-title-box">
        <i class="fa-brands fa-whatsapp whatsapp-icon"></i>
        <span>WhatsApp İle Hızlı Randevu Formu</span>
      </div>
     
      <form id="appointmentForm">
        <div class="time-row">
          <div>
            <label for="firstName">Ad</label>
            <input id="firstName" type="text" placeholder="Örn: Ali" required />
          </div>
          <div>
            <label for="lastName">Soyad</label>
            <input id="lastName" type="text" placeholder="Örn: Yılmaz" required />
          </div>
        </div>
        
        <div>
          <label for="day">İstediğiniz Gün</label>
          <select id="day" required>
            <option value="">Gün seçin</option>
            <option>Pazartesi</option>
            <option>Salı</option>
            <option>Çarşamba</option>
            <option>Perşembe</option>
            <option>Cuma</option>
            <option>Cumartesi</option>
            <option value="" disabled>Pazar - Kapalı</option>     
          </select>
        </div>

        <div class="time-row">
          <div>
            <label for="hour">Saat</label>
            <input id="hour" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="10" maxlength="2" required />
          </div>
          <div>
            <label for="minute">Dakika</label>
            <input id="minute" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="30" maxlength="2" required />
          </div>
        </div>
        
        <div>
          <label for="service">İşlem</label>
          <select id="service" required>
            <option value="">İşlem seçin</option>
            <option>Saç Kesimi</option>
            <option>Sakal Tıraşı</option>
            <option>Saç + Sakal</option>
            <option>Çocuk Tıraşı</option>    
            
          </select>
        </div>
        
        <button class="button" type="submit">WhatsApp’tan Randevu Al</button>
      </form>
      
      <div class="secondary-buttons">
        <a class="small-btn" href="https://maps.google.com/" target="_blank" rel="noopener">Konum</a>       
        <a class="small-btn" href="https://instagram.com/" target="_blank" rel="noopener">İnstagram</a>      
      </div>
     
      <p class="note">Randevunuz işletme tarafından WhatsApp üzerinden onaylandıktan sonra kesinleşir.</p>
    </section>
  </main>

  <script>                 
    const barberPhone = "905334977107";                                                         

    document.getElementById("appointmentForm").addEventListener("submit", function(event) {
      event.preventDefault();
      
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const day = document.getElementById("day").value;
      const hourInput = document.getElementById("hour").value.trim();
      const minuteInput = document.getElementById("minute").value.trim();
      const service = document.getElementById("service").value;
      
      if (!day) { alert("Lütfen randevu günü seçin. Pazar günü kapalıdır."); return; } 
      if (!/^\d{1,2}$/.test(hourInput) || !/^\d{1,2}$/.test(minuteInput)) { alert("Lütfen saat ve dakika alanlarına sadece sayı girin. Örnek: 10 ve 30"); return; }
      
      const hourNumber = Number(hourInput);
      const minuteNumber = Number(minuteInput);
      if (hourNumber < 0 || hourNumber > 23 || minuteNumber < 0 || minuteNumber > 59) { alert("Lütfen geçerli bir saat ve dakika girin. Örnek: 10 ve 30"); return; }
      
      const appointmentTime = `${hourInput}:${minuteInput}`;
      
      const message = `Kolay Gelsin, randevu almak istiyorum.\n\n Adı Soyadı:    ${firstName} ${lastName}\n İstediğim İşlem:    ${service}\n İstediğim Gün:    ${day}\n İstediğim Saat:    ${appointmentTime} `;      
      
      const whatsappUrl = `https://wa.me/${barberPhone}?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, "_blank");
    });
  </script>
</body>
</html>
